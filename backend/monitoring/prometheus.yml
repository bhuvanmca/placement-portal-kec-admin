global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'auth-service'
    static_configs:
      - targets: ['auth-service:8081']

  - job_name: 'drive-service'
    static_configs:
      - targets: ['drive-service:8083']

  - job_name: 'student-service'
    static_configs:
      - targets: ['student-service:8084']

  - job_name: 'admin-service'
    static_configs:
      - targets: ['admin-service:8085']

  - job_name: 'analytics-service'
    static_configs:
      - targets: ['analytics-service:8086']

  - job_name: 'chat-service'
    static_configs:
      - targets: ['chat-service:8081'] # internal port is 8081

  - job_name: 'postgres-exporter'
    static_configs:
      - targets: ['postgres-exporter:9187']

  - job_name: 'redis-exporter'
    static_configs:
      - targets: ['redis-exporter:9121']

  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']

  - job_name: 'cadvisor'
    static_configs:
      - targets: ['cadvisor:8080']
