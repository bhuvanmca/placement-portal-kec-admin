tunnel: 20911ab8-030e-47a5-8291-c35e4df4c114
credentials-file: /root/.cloudflared/20911ab8-030e-47a5-8291-c35e4df4c114.json

# Logging
logfile: /var/log/cloudflared.log
loglevel: info

# Ingress rules - routes traffic to your services
ingress:
  # API + WebSocket traffic from both admin frontend and student app
  - hostname: app.api-kecdrives.com
    service: http://localhost:80
    originRequest:
      noTLSVerify: true
      # WebSocket support for chat
      connectTimeout: 30s
      noHappyEyeballs: false
  
  # Catch-all rule (required - must be last)
  - service: http_status:404
