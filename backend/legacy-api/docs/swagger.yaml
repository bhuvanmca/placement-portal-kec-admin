info:
  contact:
    email: support@example.com
    name: API Support
  description: API for KEC Placement Portal
  license:
    name: Apache 2.0
    url: http://www.apache.org/licenses/LICENSE-2.0.html
  termsOfService: http://swagger.io/terms/
  title: Placement Portal KEC API
  version: "1.0"
paths:
  /auth/logout:
    post:
      description: Logout user (symbolic in JWT)
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      summary: Logout user
      tags:
      - Auth
  /auth/register:
    post:
      consumes:
      - application/json
      description: Register a new user with email, password and role
      parameters:
      - description: User Registration Details
        in: body
        name: user
        required: true
        schema:
          $ref: '#/definitions/models.RegisterInput'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      summary: Register a new user
      tags:
      - Auth
  /v1/admin/analytics/dashboard:
    get:
      description: Calculates placement statistics across multiple dimensions (year,
        dept, gender, category, offer-type)
      parameters:
      - description: 'Filter by timeframe: all_time, weekly, monthly, quarterly, half_yearly,
          annual'
        in: query
        name: timeframe
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.DashboardAnalytics'
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Get dashboard placement analytics
      tags:
      - Admin Analytics
  /v1/admin/applications/status:
    put:
      consumes:
      - application/json
      description: Update the status of a student application (shortlisted, placed,
        rejected)
      parameters:
      - description: Status Update Data
        in: body
        name: input
        required: true
        schema:
          additionalProperties: true
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
