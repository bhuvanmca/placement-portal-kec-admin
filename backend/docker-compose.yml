version: "3.8"

services:
  # 1. Your Go Application
  api:
    build:
      context: .
      dockerfile: Dockerfile

    container_name: placement_api
    restart: always
    ports:
      - "8080:8080" # Map host 8080 to container 8080
    environment:
      - PORT=8080
      - DB_URL=postgres://postgres:postgres@postgres:5432/placement_portal_kec_v2?sslmode=disable
      - JWT_SECRET=bhuvankumarVharikrishnanNbalajihariharanNSjayalakshmiSjegadeepPsuryaN
      - SMTP_EMAIL=harikrishnan4665@gmail.com
      - SMTP_PASSWORD=sdhq hqbn fxpy lwtm
      - LOGO_DEV_SECRET_KEY=${LOGO_DEV_SECRET_KEY}
      # WhatsApp Cloud API Configuration
      - WHATSAPP_PHONE_NUMBER_ID=${WHATSAPP_PHONE_NUMBER_ID}
      - WHATSAPP_ACCESS_TOKEN=${WHATSAPP_ACCESS_TOKEN}
      - WHATSAPP_VERIFY_TOKEN=${WHATSAPP_VERIFY_TOKEN}
      # Garage Configuration (S3-Compatible Object Storage)
      - GARAGE_ENDPOINT=${GARAGE_ENDPOINT}
      - GARAGE_PUBLIC_URL=${GARAGE_PUBLIC_URL}
      - GARAGE_ACCESS_KEY=${GARAGE_ACCESS_KEY}
      - GARAGE_SECRET_KEY=${GARAGE_SECRET_KEY}
      - GARAGE_BUCKET=${GARAGE_BUCKET}
      - GARAGE_CHAT_BUCKET=${GARAGE_CHAT_BUCKET}
      - GARAGE_REGION=${GARAGE_REGION}
      - GARAGE_USE_SSL=${GARAGE_USE_SSL}
    depends_on:
      postgres:
        condition: service_started
      garage:
        condition: service_started
    # Mount assets so Caddy on the host can verify them if needed (Optional but safe)
    volumes:
      - ./assets:/app/assets
      - ./firebase-service-account.json:/app/firebase-service-account.json

      - ./firebase-service-account.json:/app/firebase-service-account.json

  # 2. Chat Service (Microservice)
  chat-service:
    build:
      context: ../chat-service
      dockerfile: Dockerfile
    container_name: chat_service
    restart: always
    ports:
      - "8081:8081"
    environment:
      - CHAT_PORT=8081
      - DATABASE_URL=postgres://postgres:postgres@postgres:5432/placement_portal_kec_v2?sslmode=disable
      - JWT_SECRET=bhuvankumarVharikrishnanNbalajihariharanNSjayalakshmiSjegadeepPsuryaN
      - REDIS_ADDR=redis:6379
      - GARAGE_ENDPOINT=${GARAGE_ENDPOINT}
      - GARAGE_PUBLIC_URL=${GARAGE_PUBLIC_URL}
      - GARAGE_ACCESS_KEY=${GARAGE_ACCESS_KEY}
      - GARAGE_SECRET_KEY=${GARAGE_SECRET_KEY}
      - GARAGE_BUCKET=${GARAGE_BUCKET}
      - GARAGE_CHAT_BUCKET=${GARAGE_CHAT_BUCKET}
      - GARAGE_REGION=${GARAGE_REGION}
      - GARAGE_USE_SSL=${GARAGE_USE_SSL}
    depends_on:
      - postgres
      - redis

  # 3. Redis (Cache & Pub/Sub)
  redis:
    image: redis:alpine
    container_name: redis_cache
    restart: always
    ports:
      - "6379:6379"

  # 4. Caddy Web Server (Reverse Proxy & HTTPS)
  caddy:
    image: caddy:2-alpine
    container_name: caddy
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
      - ./assets:/app/assets # Verify assets access
    depends_on:
      - api

  # 3. Self-Hosted Database (Replacing Neon)
  postgres:
    image: postgres:15-alpine
    container_name: local_db
    restart: always
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: placement_portal_kec_v2
    volumes:
      - ./project_schema.sql:/docker-entrypoint-initdb.d/init.sql # Auto-seed schema
      - pg_data:/var/lib/postgresql/data # Persist data even if container dies

  # 3. Self-Hosted Storage (Replacing Supabase with Garage)
  garage:
    image: dxflrs/garage:v1.0.1
    container_name: local_storage
    restart: always
    environment:
      RUST_LOG: garage=info
    ports:
      - "3900:3900" # S3 API
      - "3903:3903" # Admin API (for CLI commands)
    volumes:
      - ./garage.toml:/etc/garage.toml
      - garage_data:/var/lib/garage

volumes:
  pg_data:
  garage_data:
  caddy_data:
  caddy_config:
