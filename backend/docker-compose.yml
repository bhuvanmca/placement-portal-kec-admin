version: "3.8"

services:
  # ──────────────────────────────────────────────
  # RETIRED: Monolith API (replaced by microservices)
  # ──────────────────────────────────────────────
  # api:
  #   build:
  #     context: .
  #     dockerfile: Dockerfile
  #   container_name: placement_api
  #   restart: always
  #   ports:
  #     - "8080:8080"
  #   environment:
  #     - PORT=8080
  #     - DB_URL=postgres://postgres:postgres@postgres:5432/placement_portal_kec_v2?sslmode=disable
  #     - JWT_SECRET=bhuvankumarVharikrishnanNbalajihariharanNSjayalakshmiSjegadeepPsuryaN
  #   depends_on:
  #     postgres:
  #       condition: service_started

  # 1.5 Auth Service (Microservice - Phase 1)
  auth-service:
    build:
      context: ./auth-service
      dockerfile: Dockerfile
    container_name: auth_service
    restart: always
    # Removed host ports: firewall blocks them; accessible via Caddy internally
    environment:
      - PORT=8081
      - DATABASE_URL=postgres://postgres:postgres@postgres:5432/placement_portal_kec_v2?sslmode=disable
      - JWT_SECRET=bhuvankumarVharikrishnanNbalajihariharanNSjayalakshmiSjegadeepPsuryaN
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_started

  # 1.6 Drive Service (Microservice - Phase 2)
  drive-service:
    build:
      context: ./drive-service
      dockerfile: Dockerfile
    container_name: drive_service
    restart: always
    environment:
      - PORT=8083
      - DATABASE_URL=postgres://postgres:postgres@postgres:5432/placement_portal_kec_v2?sslmode=disable
      - JWT_SECRET=bhuvankumarVharikrishnanNbalajihariharanNSjayalakshmiSjegadeepPsuryaN
      - REDIS_ADDR=redis:6379
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_started
      redis:
        condition: service_started

  # 1.7 Student Service (Microservice - Phase 3)
  student-service:
    build:
      context: ./student-service
      dockerfile: Dockerfile
    container_name: student_service
    restart: always
    environment:
      - PORT=8084
      - DATABASE_URL=postgres://postgres:postgres@postgres:5432/placement_portal_kec_v2?sslmode=disable
      - JWT_SECRET=bhuvankumarVharikrishnanNbalajihariharanNSjayalakshmiSjegadeepPsuryaN
      - REDIS_ADDR=redis:6379
      - GARAGE_ENDPOINT=${GARAGE_ENDPOINT}
      - GARAGE_PUBLIC_URL=${GARAGE_PUBLIC_URL}
      - GARAGE_ACCESS_KEY=${GARAGE_ACCESS_KEY}
      - GARAGE_SECRET_KEY=${GARAGE_SECRET_KEY}
      - GARAGE_BUCKET=${GARAGE_BUCKET}
      - GARAGE_CHAT_BUCKET=${GARAGE_CHAT_BUCKET}
      - GARAGE_REGION=${GARAGE_REGION}
      - GARAGE_USE_SSL=${GARAGE_USE_SSL}
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_started
      redis:
        condition: service_started
      garage:
        condition: service_started

  # 1.8 Admin Service (Microservice - Phase 4)
  admin-service:
    build:
      context: ./admin-service
      dockerfile: Dockerfile
    container_name: admin_service
    restart: always
    environment:
      - PORT=8085
      - DATABASE_URL=postgres://postgres:postgres@postgres:5432/placement_portal_kec_v2?sslmode=disable
      - JWT_SECRET=bhuvankumarVharikrishnanNbalajihariharanNSjayalakshmiSjegadeepPsuryaN
      - REDIS_ADDR=redis:6379
      - GARAGE_ENDPOINT=${GARAGE_ENDPOINT}
      - GARAGE_PUBLIC_URL=${GARAGE_PUBLIC_URL}
      - GARAGE_ACCESS_KEY=${GARAGE_ACCESS_KEY}
      - GARAGE_SECRET_KEY=${GARAGE_SECRET_KEY}
      - GARAGE_BUCKET=${GARAGE_BUCKET}
      - GARAGE_CHAT_BUCKET=${GARAGE_CHAT_BUCKET}
      - GARAGE_REGION=${GARAGE_REGION}
      - GARAGE_USE_SSL=${GARAGE_USE_SSL}
      - SMTP_EMAIL=${SMTP_EMAIL}
      - SMTP_PASSWORD=${SMTP_PASSWORD}
      - LOGO_DEV_SECRET_KEY=${LOGO_DEV_SECRET_KEY}
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_started
      redis:
        condition: service_started
      garage:
        condition: service_started

  # 1.9 Analytics Service (Microservice - Phase 5)
  analytics-service:
    build:
      context: ./analytics-service
      dockerfile: Dockerfile
    container_name: analytics_service
    restart: always
    environment:
      - PORT=8086
      - DATABASE_URL=postgres://postgres:postgres@postgres:5432/placement_portal_kec_v2?sslmode=disable
      - JWT_SECRET=bhuvankumarVharikrishnanNbalajihariharanNSjayalakshmiSjegadeepPsuryaN
    depends_on:
      postgres:
        condition: service_started

  # 2. Chat Service (Microservice)
  chat-service:
    build:
      context: ./chat-service
      dockerfile: Dockerfile
    container_name: chat_service
    restart: always
    environment:
      - CHAT_PORT=8081
      - DATABASE_URL=postgres://postgres:postgres@postgres:5432/placement_portal_kec_v2?sslmode=disable
      - JWT_SECRET=bhuvankumarVharikrishnanNbalajihariharanNSjayalakshmiSjegadeepPsuryaN
      - REDIS_ADDR=redis:6379
      - GARAGE_ENDPOINT=${GARAGE_ENDPOINT}
      - GARAGE_PUBLIC_URL=${GARAGE_PUBLIC_URL}
      - GARAGE_ACCESS_KEY=${GARAGE_ACCESS_KEY}
      - GARAGE_SECRET_KEY=${GARAGE_SECRET_KEY}
      - GARAGE_BUCKET=${GARAGE_BUCKET}
      - GARAGE_CHAT_BUCKET=${GARAGE_CHAT_BUCKET}
      - GARAGE_REGION=${GARAGE_REGION}
      - GARAGE_USE_SSL=${GARAGE_USE_SSL}
      - TWILIO_ACCOUNT_SID=${TWILIO_ACCOUNT_SID}
      - TWILIO_AUTH_TOKEN=${TWILIO_AUTH_TOKEN}
      - TWILIO_WHATSAPP_FROM=${TWILIO_WHATSAPP_FROM}
    env_file:
      - .env
    depends_on:
      - postgres
      - redis

  # 3. Redis (Cache & Pub/Sub)
  redis:
    image: redis:7.4-alpine
    container_name: redis_cache
    restart: always

  # 4. Caddy Web Server (Reverse Proxy & HTTPS)
  caddy:
    image: caddy:2.9-alpine
    container_name: caddy
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
      - ./assets:/app/assets
    depends_on:
      - auth-service
      - admin-service

  # 3. Self-Hosted Database (Replacing Neon)
  postgres:
    image: postgres:15.10-alpine
    container_name: local_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: kecdrives-db
    volumes:
      - pg_data:/var/lib/postgresql/data

  # 3. Self-Hosted Storage (Replacing Supabase with Garage)
  garage:
    image: dxflrs/garage:v1.0.1
    container_name: local_storage
    restart: always
    environment:
      RUST_LOG: garage=info
    volumes:
      - ./garage.toml:/etc/garage.toml
      - garage_data:/var/lib/garage

  # ──────────────────────────────────────────────
  # Monitoring Stack (Production Ready)
  # ──────────────────────────────────────────────

  prometheus:
    image: prom/prometheus:v3.1.0
    container_name: prometheus
    restart: always
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
      - '--web.enable-lifecycle'
      - '--web.external-url=/prometheus/'
    depends_on:
      - auth-service
      - drive-service
      - student-service
      - admin-service
      - analytics-service
      - chat-service

  grafana:
    image: grafana/grafana:11.4.0
    container_name: grafana
    restart: always
    volumes:
      - grafana_data:/var/lib/grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
      - GF_SERVER_ROOT_URL=%(protocol)s://%(domain)s:%(http_port)s/grafana/
      - GF_SERVER_SERVE_FROM_SUB_PATH=true
    depends_on:
      - prometheus

  pgadmin:
    image: dpage/pgadmin4:8.14
    container_name: pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@kec.edu}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
      PGADMIN_CONFIG_ENHANCED_COOKIE_PROTECTION: "False"
      PGADMIN_CONFIG_CONSOLE_LOG_LEVEL: 10
      PGADMIN_CONFIG_X_FRAME_OPTIONS: "'ALLOWALL'"
      PGADMIN_CONFIG_X_SCRIPT_NAME: "'/pgadmin'"
      PGADMIN_CONFIG_COOKIE_SAMESITE: "'Lax'"
      PGADMIN_CONFIG_CSRF_CHECK_RESULT: "False"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      - postgres

  node-exporter:
    image: prom/node-exporter:v1.8.2
    container_name: node_exporter
    restart: always
    command:
      - '--path.rootfs=/host'
    volumes:
      - '/:/host:ro,rslave'

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    container_name: cadvisor
    restart: always
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    devices:
      - /dev/kmsg

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.16.0
    container_name: postgres_exporter
    restart: always
    environment:
      DATA_SOURCE_NAME: "postgresql://postgres:postgres@postgres:5432/placement_portal_kec_v2?sslmode=disable"
    depends_on:
      - postgres

  redis-exporter:
    image: oliver006/redis_exporter:v1.66.0
    container_name: redis_exporter
    restart: always
    environment:
      - REDIS_ADDR=redis:6379
    depends_on:
      - redis

volumes:
  pg_data:
  garage_data:
  caddy_data:
  caddy_config:
  prometheus_data:
  grafana_data:
  pgadmin_data:
