version: "3.8"

services:
  # ──────────────────────────────────────────────
  # RETIRED: Monolith API (replaced by microservices)
  # ──────────────────────────────────────────────
  # api:
  #   build:
  #     context: .
  #     dockerfile: Dockerfile
  #   container_name: placement_api
  #   restart: always
  #   ports:
  #     - "8080:8080"
  #   environment:
  #     - PORT=8080
  #     - DB_URL=postgres://postgres:postgres@postgres:5432/placement_portal_kec_v2?sslmode=disable
  #     - JWT_SECRET=bhuvankumarVharikrishnanNbalajihariharanNSjayalakshmiSjegadeepPsuryaN
  #   depends_on:
  #     postgres:
  #       condition: service_started

  # 1.5 Auth Service (Microservice - Phase 1)
  auth-service:
    build:
      context: ./auth-service
      dockerfile: Dockerfile
    container_name: auth_service
    restart: always
    ports:
      - "8081:8081"
    environment:
      - PORT=8081
      - DATABASE_URL=postgres://postgres:postgres@postgres:5432/placement_portal_kec_v2?sslmode=disable&search_path=auth,public
      - JWT_SECRET=bhuvankumarVharikrishnanNbalajihariharanNSjayalakshmiSjegadeepPsuryaN
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_started

  # 1.6 Drive Service (Microservice - Phase 2)
  drive-service:
    build:
      context: ./drive-service
      dockerfile: Dockerfile
    container_name: drive_service
    restart: always
    ports:
      - "8083:8083"
    environment:
      - PORT=8083
      - DATABASE_URL=postgres://postgres:postgres@postgres:5432/placement_portal_kec_v2?sslmode=disable&search_path=drive,public
      - JWT_SECRET=bhuvankumarVharikrishnanNbalajihariharanNSjayalakshmiSjegadeepPsuryaN
      - REDIS_ADDR=redis:6379
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_started
      redis:
        condition: service_started

  # 1.7 Student Service (Microservice - Phase 3)
  student-service:
    build:
      context: ./student-service
      dockerfile: Dockerfile
    container_name: student_service
    restart: always
    ports:
      - "8084:8084"
    environment:
      - PORT=8084
      - DATABASE_URL=postgres://postgres:postgres@postgres:5432/placement_portal_kec_v2?sslmode=disable&search_path=student,public
      - JWT_SECRET=bhuvankumarVharikrishnanNbalajihariharanNSjayalakshmiSjegadeepPsuryaN
      - REDIS_ADDR=redis:6379
      - GARAGE_ENDPOINT=${GARAGE_ENDPOINT}
      - GARAGE_PUBLIC_URL=${GARAGE_PUBLIC_URL}
      - GARAGE_ACCESS_KEY=${GARAGE_ACCESS_KEY}
      - GARAGE_SECRET_KEY=${GARAGE_SECRET_KEY}
      - GARAGE_BUCKET=${GARAGE_BUCKET}
      - GARAGE_CHAT_BUCKET=${GARAGE_CHAT_BUCKET}
      - GARAGE_REGION=${GARAGE_REGION}
      - GARAGE_USE_SSL=${GARAGE_USE_SSL}
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_started
      redis:
        condition: service_started
      garage:
        condition: service_started

  # 1.8 Admin Service (Microservice - Phase 4)
  admin-service:
    build:
      context: ./admin-service
      dockerfile: Dockerfile
    container_name: admin_service
    restart: always
    ports:
      - "8085:8085"
    environment:
      - PORT=8085
      - DATABASE_URL=postgres://postgres:postgres@postgres:5432/placement_portal_kec_v2?sslmode=disable&search_path=admin,student,drive,public
      - JWT_SECRET=bhuvankumarVharikrishnanNbalajihariharanNSjayalakshmiSjegadeepPsuryaN
      - REDIS_ADDR=redis:6379
      - GARAGE_ENDPOINT=${GARAGE_ENDPOINT}
      - GARAGE_PUBLIC_URL=${GARAGE_PUBLIC_URL}
      - GARAGE_ACCESS_KEY=${GARAGE_ACCESS_KEY}
      - GARAGE_SECRET_KEY=${GARAGE_SECRET_KEY}
      - GARAGE_BUCKET=${GARAGE_BUCKET}
      - GARAGE_CHAT_BUCKET=${GARAGE_CHAT_BUCKET}
      - GARAGE_REGION=${GARAGE_REGION}
      - GARAGE_USE_SSL=${GARAGE_USE_SSL}
      - SMTP_EMAIL=${SMTP_EMAIL}
      - SMTP_PASSWORD=${SMTP_PASSWORD}
      - LOGO_DEV_SECRET_KEY=${LOGO_DEV_SECRET_KEY}
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_started
      redis:
        condition: service_started
      garage:
        condition: service_started

  # 1.9 Analytics Service (Microservice - Phase 5)
  analytics-service:
    build:
      context: ./analytics-service
      dockerfile: Dockerfile
    container_name: analytics_service
    restart: always
    ports:
      - "8086:8086"
    environment:
      - PORT=8086
      - DATABASE_URL=postgres://postgres:postgres@postgres:5432/placement_portal_kec_v2?sslmode=disable&search_path=student,drive,admin,public
      - JWT_SECRET=bhuvankumarVharikrishnanNbalajihariharanNSjayalakshmiSjegadeepPsuryaN
    depends_on:
      postgres:
        condition: service_started

  # 2. Chat Service (Microservice)
  chat-service:
    build:
      context: ./chat-service
      dockerfile: Dockerfile
    container_name: chat_service
    restart: always
    ports:
      - "8082:8081" # Changed host port to 8082 to avoid collision with auth-service
    environment:
      - CHAT_PORT=8081
      - DATABASE_URL=postgres://postgres:postgres@postgres:5432/placement_portal_kec_v2?sslmode=disable&search_path=chat,public
      - JWT_SECRET=bhuvankumarVharikrishnanNbalajihariharanNSjayalakshmiSjegadeepPsuryaN
      - REDIS_ADDR=redis:6379
      - GARAGE_ENDPOINT=${GARAGE_ENDPOINT}
      - GARAGE_PUBLIC_URL=${GARAGE_PUBLIC_URL}
      - GARAGE_ACCESS_KEY=${GARAGE_ACCESS_KEY}
      - GARAGE_SECRET_KEY=${GARAGE_SECRET_KEY}
      - GARAGE_BUCKET=${GARAGE_BUCKET}
      - GARAGE_CHAT_BUCKET=${GARAGE_CHAT_BUCKET}
      - GARAGE_REGION=${GARAGE_REGION}
      - GARAGE_USE_SSL=${GARAGE_USE_SSL}
      - TWILIO_ACCOUNT_SID=${TWILIO_ACCOUNT_SID}
      - TWILIO_AUTH_TOKEN=${TWILIO_AUTH_TOKEN}
      - TWILIO_WHATSAPP_FROM=${TWILIO_WHATSAPP_FROM}
    env_file:
      - .env
    depends_on:
      - postgres
      - redis

  # 3. Redis (Cache & Pub/Sub)
  redis:
    image: redis:alpine
    container_name: redis_cache
    restart: always
    ports:
      - "6379:6379"

  # 4. Caddy Web Server (Reverse Proxy & HTTPS)
  caddy:
    image: caddy:2-alpine
    container_name: caddy
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
      - ./assets:/app/assets # Verify assets access
    depends_on:
      - auth-service
      - admin-service

  # 3. Self-Hosted Database (Replacing Neon)
  postgres:
    image: postgres:15-alpine
    container_name: local_db
    restart: always
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: placement_portal_kec_v2
    volumes:
      - ./project_schema.sql:/docker-entrypoint-initdb.d/init.sql # Auto-seed schema
      - ./auth-service/schema.sql:/docker-entrypoint-initdb.d/init-auth.sql # Auto-seed auth schema
      - ./drive-service/schema.sql:/docker-entrypoint-initdb.d/init-drive.sql # Auto-seed drive schema
      - ./student-service/schema.sql:/docker-entrypoint-initdb.d/init-student.sql # Auto-seed student schema
      - ./admin-service/schema.sql:/docker-entrypoint-initdb.d/init-admin.sql # Auto-seed admin schema
      - pg_data:/var/lib/postgresql/data # Persist data even if container dies

  # 3. Self-Hosted Storage (Replacing Supabase with Garage)
  garage:
    image: dxflrs/garage:v1.0.1
    container_name: local_storage
    restart: always
    environment:
      RUST_LOG: garage=info
    ports:
      - "3900:3900" # S3 API
      - "3903:3903" # Admin API (for CLI commands)
    volumes:
      - ./garage.toml:/etc/garage.toml
      - garage_data:/var/lib/garage

volumes:
  pg_data:
  garage_data:
  caddy_data:
  caddy_config:
